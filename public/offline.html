<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    body {
      margin: 0;

      background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 20px;
    }

    }

      margin-bottom: 24px;

      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;

      cursor: pointer;
      transition: opacity 0.3s;
    }
    button:hover {
      opacity: 0.9;
    }

</html>
